[[headers]]
for = "/index.html"
[headers.values]
Cache-Control = "public, max-age=0, s-maxage=300, stale-while-revalidate=60, stale-if-error=86400"

[[headers]]
for = "/shipping/index.html"
[headers.values]
Cache-Control = "public, max-age=3600, s-maxage=3600, stale-while-revalidate=60"

[[headers]]
for = "/returns/index.html"
[headers.values]
Cache-Control = "public, max-age=3600, s-maxage=3600, stale-while-revalidate=60"

[[headers]]
for = "/api/media/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
from = "/api/media/*"
to = "http://138.2.172.187/:splat"
status = 200

[[redirects]]
from = "/umami/*"
to = "http://138.2.172.187/umami/:splat"
status = 200
force = true
